apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:3.6
        ports:
        - containerPort: 27017
        command:
        - "bash"
        - "-c"
        - |
          echo "db.getSiblingDB('namegen').createUser({user: 'genuser', pwd: 'password', roles: [{role: 'readWrite', db: 'namegen'}]});" > /docker-entrypoint-initdb.d/init.js
          exec docker-entrypoint.sh mongod --auth --bind_ip_all
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
      - name: mongo-storage
        emptyDir: {}
