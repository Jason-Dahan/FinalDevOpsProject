apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen-app-deployment
  labels:
    app: namegen-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: namegen-app
  template:
    metadata:
      labels:
        app: namegen-app
    spec:
      containers:
      - name: namegen-container
        image: namegen:latest
        ports:
        - containerPort: 8080
        env:
        - name: MONGODB_URL
          # 🚀 Removed the unconfigured user/password so it connects cleanly
          value: "mongodb://mongodb:27017/namegen"
      nodeSelector:
        eks.amazonaws.com/compute-type: auto
